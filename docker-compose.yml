version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: computing-power-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-computing_power}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - computing-power-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-computing_power}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: computing-power-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-computing_power}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - WORK_HOUR_START=${WORK_HOUR_START:-9}
      - WORK_HOUR_END=${WORK_HOUR_END:-18}
      - HIGH_USAGE_THRESHOLD=${HIGH_USAGE_THRESHOLD:-60.0}
      - LOW_USAGE_THRESHOLD=${LOW_USAGE_THRESHOLD:-30.0}
      - CACHE_SYNC_INTERVAL=${CACHE_SYNC_INTERVAL:-3600}
    volumes:
      - backend-data:/app/data
    networks:
      - computing-power-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8001}
    container_name: computing-power-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - computing-power-network

networks:
  computing-power-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  backend-data:
    driver: local
