services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: computing-power-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-computing_power}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - WORK_HOUR_START=${WORK_HOUR_START:-9}
      - WORK_HOUR_END=${WORK_HOUR_END:-18}
      - HIGH_USAGE_THRESHOLD=${HIGH_USAGE_THRESHOLD:-60.0}
      - LOW_USAGE_THRESHOLD=${LOW_USAGE_THRESHOLD:-30.0}
      - CACHE_SYNC_INTERVAL=${CACHE_SYNC_INTERVAL:-3600}
    volumes:
      - backend-data:/app/data
    networks:
      - computing-power-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: computing-power-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - computing-power-network

networks:
  computing-power-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
